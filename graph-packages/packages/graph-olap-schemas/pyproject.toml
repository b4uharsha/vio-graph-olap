[project]
name = "graph-olap-schemas"
version = "1.0.1"
description = "Shared Pydantic schemas for Graph OLAP Platform"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.10.0"]

[project.optional-dependencies]
dev = ["pytest>=9.0.2", "pytest-cov>=7.0.0", "ruff>=0.14.10", "mypy>=1.19.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/graph_olap_schemas"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501", "UP046"]  # E501: line too long (handled by formatter), UP046: requires Python 3.12+ type params

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
