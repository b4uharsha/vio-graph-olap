# KEDA ScaledObject for Export Worker
# Scales based on pending export job count (ADR-025 database polling)
#
# Prerequisites:
#   1. KEDA installed: kubectl apply -f https://github.com/kedacore/keda/releases/download/v2.13.0/keda-2.13.0.yaml
#   2. PostgreSQL scaler with read-only access to export_jobs table
#   3. Database connection secret configured (see secret.yaml)
#
# Behavior:
#   - Scale to 0 when no pending jobs in database
#   - Scale up when pending jobs > targetQueryValue per pod
#   - Smooth scaling with stabilization window

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: export-worker-scaledobject
  labels:
    app: export-worker
    component: export
spec:
  scaleTargetRef:
    name: export-worker
  pollingInterval: 15  # Check metrics every 15 seconds
  cooldownPeriod: 60   # Wait 60s before scaling down
  minReplicaCount: 0   # Scale to zero when idle
  maxReplicaCount: 5   # Max 5 pods
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120  # Wait 2 min before scaling down
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
  triggers:
    # Scale based on pending export job count from database
    - type: postgresql
      metadata:
        # Query returns count of pending jobs
        query: "SELECT COUNT(*) FROM export_jobs WHERE status = 'pending'"
        targetQueryValue: "10"  # Scale up when > 10 pending jobs per pod
        # Connection string provided via TriggerAuthentication
      authenticationRef:
        name: export-worker-db-auth

---
# TriggerAuthentication for PostgreSQL connection
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: export-worker-db-auth
  labels:
    app: export-worker
spec:
  secretTargetRef:
    # Database connection string (read-only user recommended)
    - parameter: connectionString
      name: export-worker-secrets
      key: KEDA_DATABASE_URL
