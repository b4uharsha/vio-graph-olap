# Export Worker Secrets
# Sensitive configuration values
#
# In production, use:
#   - External Secrets Operator to sync from Secret Manager
#   - Sealed Secrets for GitOps
#   - Or create manually: kubectl create secret generic export-worker-secrets ...

apiVersion: v1
kind: Secret
metadata:
  name: export-worker-secrets
  labels:
    app: export-worker
    component: export
type: Opaque
stringData:
  # Starburst password - REPLACE with actual value
  STARBURST_PASSWORD: "REPLACE_ME"

  # KEDA database connection - REPLACE with actual Cloud SQL connection string
  # Should use read-only user for security
  # Format: postgresql://user:password@host:port/database?sslmode=require
  KEDA_DATABASE_URL: "postgresql://keda_reader:REPLACE_ME@localhost:5432/graph_olap?sslmode=require"

  # Optional: Internal API key for Control Plane
  # GRAPH_OLAP_INTERNAL_API_KEY: "REPLACE_ME"
