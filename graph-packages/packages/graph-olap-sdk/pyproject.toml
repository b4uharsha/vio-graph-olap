[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "graph-olap-sdk"
version = "0.5.0"
description = "Python SDK for Graph OLAP Platform - Jupyter notebook integration for graph analytics"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Graph OLAP Team" }
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: Jupyter",
    "Topic :: Scientific/Engineering",
    "Topic :: Database",
    "Typing :: Typed",
]
keywords = ["graph", "olap", "jupyter", "analytics", "cypher", "networkx"]

dependencies = [
    "httpx>=0.28.1",
    "pydantic>=2.10.0",
    "tenacity>=9.1.2",
    "graph-olap-schemas>=1.0.0",
]

[project.optional-dependencies]
# DataFrame support
dataframe = [
    "polars>=1.36.1",
    "pandas>=2.3.3",
]

# Visualization
viz = [
    "networkx>=3.6.1",
    "pyvis>=0.3.2",
    "plotly>=6.5.0",
]

# Interactive Jupyter features
interactive = [
    "itables>=2.6.2",
    "ipywidgets>=8.1.8",
]

# All features for analysts
all = [
    "graph-olap-sdk[dataframe,viz,interactive]",
]

# Development dependencies
dev = [
    # Testing
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.8.0",        # Parallel test execution
    "pytest-timeout>=2.4.0",      # Prevent hanging tests
    "pytest-randomly>=4.0.1",     # Randomize test order
    "respx>=0.22.0",
    "hypothesis>=6.149.0",        # Property-based testing
    "factory-boy>=3.3.3",         # Test fixture factories
    # Type checking & linting
    "mypy>=1.19.1",
    "ruff>=0.14.10",
    "pre-commit>=4.5.1",
]

[project.urls]
Documentation = "https://graph-olap.docs.internal"
Repository = "https://github.com/internal/graph-olap-sdk"

[tool.hatch.build.targets.wheel]
packages = ["src/graph_olap"]

[tool.hatch.build.targets.wheel.force-include]
"src/graph_olap/styles/notebook.css" = "graph_olap/styles/notebook.css"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-v --cov=graph_olap --cov-report=term-missing --timeout=30"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
# Run with: pytest -n auto (for parallel execution)

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes (undefined names, unused imports)
    "I",      # isort (import ordering)
    "N",      # pep8-naming (naming conventions)
    "UP",     # pyupgrade (modern Python syntax)
    "B",      # flake8-bugbear (common bugs)
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify (code simplification)
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate (commented-out code)
    "RUF",    # Ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI Depends)
    "SIM105", # use contextlib.suppress (sometimes less readable)
    "SIM117", # nested with statements (sometimes more readable)
    "N806",   # variable in function should be lowercase (NetworkX convention)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F841", "ARG001", "ARG002"]  # unused variables/fixtures OK in tests

[tool.ruff.lint.isort]
known-first-party = ["graph_olap"]

[tool.coverage.run]
source = ["src/graph_olap"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
