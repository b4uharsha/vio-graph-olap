site_name: Graph OLAP Platform Documentation
site_url: https://docs.graph-olap.example.com
repo_url: https://github.com/graph-olap/graph-olap
repo_name: graph-olap/graph-olap

docs_dir: build

# Use .html file URLs instead of directory URLs (e.g., /page.html not /page/)
# Required for fast build which pre-renders notebooks to .html files
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      allow_errors: true
      include: ["*.ipynb"]
      ignore: ["*.nbconvert.ipynb", ".ipynb_checkpoints/*"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/notebook.css
  - stylesheets/layout.css
  - stylesheets/dropdown-nav.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - https://unpkg.com/@mermaid-js/layout-elk@0.1.4/dist/mermaid-layout-elk.min.js
  - javascripts/mermaid-init.js
  - javascripts/toc-toggle.js
  - javascripts/dropdown-nav.js

nav:
  - Home: index.md

