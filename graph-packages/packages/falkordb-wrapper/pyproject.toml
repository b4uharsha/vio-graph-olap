[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "falkordb-wrapper"
version = "0.1.0"
description = "FastAPI wrapper for embedded FalkorDB graph database instances"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "Graph OLAP Platform Team" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Database :: Database Engines/Servers",
]
dependencies = [
    "fastapi>=0.128.0",
    "uvicorn[standard]>=0.40.0",
    "httpx>=0.28.1",
    "tenacity>=9.1.2",
    "structlog>=25.5.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.12.0",
    "graph-olap-schemas>=1.0.0",
    "lib-auth>=1.0.0",
    # Core graph dependencies
    "FalkorDBLite>=0.6.0",  # Embedded FalkorDB with async API (supports Python 3.12+)
    # Data and utilities
    "polars>=1.36.1",
    "docstring-parser>=0.17",
    "psutil>=7.2.1",
    "google-cloud-storage>=3.7.0",
    "google-auth>=2.45.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
    "respx>=0.22.0",
    "ruff>=0.14.10",
    "mypy>=1.19.1",
    "testcontainers>=4.13.3",
    "pyarrow>=22.0.0",
    "types-psutil>=7.2.1",
    "docker>=7.1.0",
    "kubernetes>=34.1.0",
]

[project.scripts]
wrapper = "wrapper.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/wrapper"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "unit: Fast unit tests with mocks (no Docker, no external services)",
    "integration: Tests with Docker containers (testcontainers, real FalkorDB)",
    "e2e: End-to-end tests on Kubernetes (requires k3d cluster)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]
timeout = 60

[tool.coverage.run]
source = ["src/wrapper"]
branch = true
omit = [
    "*/tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@abstractmethod",
]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "ARG", "PTH", "ERA", "RUF",
]
ignore = [
    "E501", "B008", "SIM102", "SIM105", "SIM117",
]

[tool.ruff.lint.isort]
known-first-party = ["wrapper"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ARG001", "ARG002", "F841"]
"src/wrapper/main.py" = ["ARG001"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = [
    "FalkorDBLite.*",
    "testcontainers.*",
    "google.cloud.*",
    "google.auth.*",
]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
