# Alembic configuration file.
#
# This file is used by alembic for database migrations.
# In production, migrations are run against PostgreSQL.
# In development/testing, tables are auto-created via metadata.create_all().

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this value
prepend_sys_path = src

# Timezone for file_template date/time formatting
timezone = UTC

# Max length of slug field in file names
truncate_slug_length = 40

# Enable sorting of revision digests lexicographically
revision_environment = true

# Set to 'true' to run migrations in an offline mode
# (useful for generating SQL scripts without a database)
# offline = false

# Use batch mode for Postgres operations
# This is more reliable for constraint modifications
# compare_type = true
# compare_server_default = true

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
