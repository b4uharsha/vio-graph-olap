worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/log/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    client_body_temp_path /var/cache/nginx/client_temp 1 2;
    proxy_temp_path       /var/cache/nginx/proxy_temp 1 2;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp 1 2;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp 1 2;
    scgi_temp_path        /var/cache/nginx/scgi_temp 1 2;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$upstream_addr" $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # CoreDNS resolver for dynamic wrapper-{slug} service resolution
    resolver kube-dns.kube-system.svc.cluster.local valid=5s;

    server {
        listen 8080 default_server;
        server_name _;

        # Health check for liveness/readiness probes
        location /healthz {
            default_type application/json;
            return 200 '{"status":"healthy"}';
        }

        # Status page
        location = / {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><title>Graph OLAP Wrapper Proxy</title></head><body><h1>Wrapper Proxy</h1><p>Routes queries to graph database instances (FalkorDB / KuzuDB).</p><p><a href="/healthz">Health Check</a></p></body></html>';
        }

        # Static wrappers (always running)
        location ^~ /wrapper/falkordb/ {
            proxy_pass http://falkordb-wrapper.graph-olap-platform.svc.cluster.local:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location ^~ /wrapper/ryugraph/ {
            proxy_pass http://ryugraph-wrapper.graph-olap-platform.svc.cluster.local:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # Dynamic wrappers -- pattern: /wrapper/{slug}/* -> wrapper-{slug}:8000/*
        location ~ ^/wrapper/([a-z0-9-]+)(/.*)?$ {
            set $slug $1;
            set $path $2;
            set $upstream http://wrapper-$slug.graph-olap-platform.svc.cluster.local:8000;

            proxy_pass $upstream$path;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }
    }
}
