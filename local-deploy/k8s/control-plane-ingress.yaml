---
# Root → Documentation proxy (serves docs site at localhost:30081/)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: root-docs
  namespace: graph-olap-local
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: graph-olap-documentation
                port:
                  number: 3000

---
# API Ingress - No authentication (local development)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane-api
  namespace: graph-olap-local
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: graph-olap-control-plane
                port:
                  number: 8080

---
# Jupyter Labs Ingress - No authentication (base path /jupyter set by Helm chart)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jupyter-labs-nginx
  namespace: graph-olap-local
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "jupyter-labs"
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /jupyter
            pathType: Prefix
            backend:
              service:
                name: jupyter-labs
                port:
                  number: 8888

---
# Health Ingress - No authentication (for probes and monitoring)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane-health
  namespace: graph-olap-local
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: graph-olap-control-plane
                port:
                  number: 8080
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: graph-olap-control-plane
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: graph-olap-control-plane
                port:
                  number: 8080
