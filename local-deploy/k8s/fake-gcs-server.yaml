---
# Persistent storage for fake GCS so uploaded parquet files survive pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fake-gcs-data
  namespace: graph-olap-local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# Fake GCS Server for local development
# Satisfies export-worker's STORAGE_EMULATOR_HOST=http://fake-gcs-local:4443
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-gcs-local
  namespace: graph-olap-local
  labels:
    app: fake-gcs-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-gcs-local
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fake-gcs-local
    spec:
      containers:
        - name: fake-gcs-server
          image: fsouza/fake-gcs-server:latest
          args:
            - -scheme
            - http
            - -port
            - "4443"
            - -backend
            - filesystem
            - -filesystem-root
            - /data
            - -public-host
            - fake-gcs-local:4443
          ports:
            - containerPort: 4443
          volumeMounts:
            - name: gcs-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: gcs-data
          persistentVolumeClaim:
            claimName: fake-gcs-data
---
apiVersion: v1
kind: Service
metadata:
  name: fake-gcs-local
  namespace: graph-olap-local
spec:
  selector:
    app: fake-gcs-local
  ports:
    - port: 4443
      targetPort: 4443
