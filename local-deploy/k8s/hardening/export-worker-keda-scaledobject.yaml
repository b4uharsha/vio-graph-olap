# KEDA ScaledObject -- scales export-worker based on pending job count
#
# Trigger: HTTP metrics-api -- polls control-plane API for pending job count.
# This avoids needing a standalone Cloud SQL Proxy since control-plane already
# has one and can query the DB on KEDA's behalf.
#
# Before applying:
#   1. Ensure control-plane exposes GET /api/export-jobs/pending-count
#   2. Set export-worker deployment replicas: 0 (KEDA manages replicas)

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: export-worker-scaledobject
  labels:
    app: export-worker
    component: export
spec:
  scaleTargetRef:
    name: graph-olap-export-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 5
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Pods
              value: 2
              periodSeconds: 30
  triggers:
    - type: metrics-api
      metadata:
        targetValue: "10"
        url: "http://control-plane-svc.graph-olap-platform.svc:8080/api/export-jobs/pending-count"
        valueLocation: "pendingCount"
