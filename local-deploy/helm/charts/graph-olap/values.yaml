# =============================================================================
# Graph OLAP Platform - Umbrella Chart Values
# =============================================================================
#
# This chart deploys the Graph OLAP application stack:
#   - control-plane: FastAPI backend + HTMX web UI
#   - export-worker: KEDA-scaled job processor
#   - system: Namespaces, quotas, network policies (optional)
#   - observability: GMP PodMonitoring, alerts (optional)
#
# Infrastructure (ingress, cert-manager, oauth2-proxy, jupyterhub) is deployed
# separately via Terraform helm_release resources.
#
# Usage:
#   helm dependency update
#   helm install graph-olap . -n graph-olap-local --create-namespace
#
# With Terraform:
#   helm_release "graph_olap" { values = [yamlencode({...})] }
#
# =============================================================================

# -----------------------------------------------------------------------------
# Global Values (inherited by all subcharts via .Values.global)
# -----------------------------------------------------------------------------
global:
  # Container registry prefix for all images
  # Example: "your-registry/graph-olap"
  imageRegistry: ""

  # Image pull secrets for private registries
  imagePullSecrets: []

  # GCP Project ID (used for Workload Identity, GCS, etc.)
  gcpProject: ""

  # Environment name (production, staging, development)
  environment: "production"

  # Common labels applied to all resources
  commonLabels:
    app.kubernetes.io/part-of: graph-olap

  # Common annotations
  commonAnnotations: {}

# -----------------------------------------------------------------------------
# Control Plane
# -----------------------------------------------------------------------------
control-plane:
  enabled: true

  image:
    # Repository is constructed as: {global.imageRegistry}/control-plane
    # or override completely with: repository: "full/path/to/image"
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false  # Created by Terraform for Workload Identity
    name: "control-plane"
    gcpServiceAccount: ""  # e.g., "control-plane-sa@project.iam.gserviceaccount.com"

  # Application configuration (becomes ConfigMap environment variables)
  config:
    host: "0.0.0.0"
    port: "8080"
    debug: "false"
    gcpProject: ""
    gcs:
      bucket: ""
    k8s:
      namespace: ""
      inCluster: "true"
    wrapper:
      image: ""
      falkordbImage: ""
      pullPolicy: "IfNotPresent"
      serviceAccount: "graph-wrapper"
      externalBaseUrl: ""
      ingressClass: "nginx"
    extensionServer:
      url: "http://extension-server:80"
    starburst:
      url: ""
      user: ""
      catalog: "bigquery"
      schema: "public"
      timeoutSeconds: "60"
    jobs:
      reconciliationIntervalSeconds: "30"
      lifecycleIntervalSeconds: "30"
      schemaCacheIntervalSeconds: "300"
    ryugraph:
      memoryRequest: "512Mi"
      memoryLimit: "1Gi"
      cpuRequest: "250m"
      cpuLimit: "1"
      bufferPoolSize: "134217728"
    falkordb:
      memoryRequest: "512Mi"
      memoryLimit: "1Gi"
      cpuRequest: "250m"
      cpuLimit: "1"
    auth0:
      jwksUrl: ""
      audience: ""
      issuer: ""

  # External secrets (created by Terraform)
  secrets:
    enabled: true
    databaseUrl:
      secretName: "control-plane-secrets"
      key: "database-url"
    apiInternalToken:
      secretName: "control-plane-secrets"
      key: "api-internal-token"

  # Init container to wait for PostgreSQL
  initContainers:
    waitForPostgres:
      enabled: true
      image: "busybox:1.36"
      host: ""  # PostgreSQL host
      port: 5432

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  ingress:
    enabled: false  # Ingress managed by Terraform

# -----------------------------------------------------------------------------
# Export Worker
# -----------------------------------------------------------------------------
export-worker:
  enabled: true

  image:
    repository: ""
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  serviceAccount:
    create: false
    name: "export-worker"
    gcpServiceAccount: ""

  config:
    gcpProject: ""
    starburst:
      url: ""
      user: ""
      catalog: "bigquery"
      schema: "public"
      requestTimeoutSeconds: "30"
      clientTags: "graph-olap-export"
      source: "graph-olap-export-worker"
    controlPlane:
      url: "http://control-plane:8080"
      timeoutSeconds: "30"
      maxRetries: "5"
    worker:
      pollIntervalSeconds: "5"
      emptyPollBackoffSeconds: "10"
      claimLimit: "10"
      pollLimit: "10"
    logging:
      level: "INFO"
      format: "json"
    dryRun: "false"

  secrets:
    starburst:
      secretName: "export-worker-secrets"
      passwordKey: "STARBURST_PASSWORD"
    internalApiKey:
      secretName: "export-worker-secrets"
      key: "GRAPH_OLAP_INTERNAL_API_KEY"

  initContainers:
    waitForDeps:
      enabled: true
      image: "busybox:1.36"
      host: "control-plane"
      port: 8080

  # KEDA autoscaling (disabled by default - requires KEDA installation)
  keda:
    enabled: false
    pollingInterval: 15
    cooldownPeriod: 60
    minReplicaCount: 0
    maxReplicaCount: 5

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# System (optional)
# -----------------------------------------------------------------------------
system:
  enabled: false  # Namespaces/quotas managed by Terraform

# -----------------------------------------------------------------------------
# Observability (optional)
# -----------------------------------------------------------------------------
observability:
  enabled: false  # Enable for GMP PodMonitoring

# -----------------------------------------------------------------------------
# PostgreSQL (local development only)
# -----------------------------------------------------------------------------
# In-cluster PostgreSQL for local development. GKE uses Cloud SQL instead.
postgres:
  enabled: false  # Enable for local development only
  image:
    repository: postgres
    tag: "15-alpine"
    pullPolicy: IfNotPresent
  database: "control_plane"
  username: "control_plane"
  password: "control_plane"
  internalApiKey: "test-internal-api-key"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

# -----------------------------------------------------------------------------
# Extension Server
# -----------------------------------------------------------------------------
# Ryugraph algorithm extensions service. Same in both local and GKE.
extensionServer:
  enabled: false  # Enable to deploy extension-server
  image:
    repository: ghcr.io/predictable-labs/extension-repo
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# -----------------------------------------------------------------------------
# OAuth2 Proxy
# -----------------------------------------------------------------------------
# JWT validation and authentication proxy.
# Local: Simple JWT validation against Auth0 (creates inline secret)
# GKE: Full OAuth2 proxy with session management (uses existingSecret from Terraform)
oauth2Proxy:
  enabled: false  # Enable to deploy oauth2-proxy
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.6.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Use existing secret (created by Terraform) - if set, inline secret is not created
  existingSecret: ""
  # Cookie secret - MUST be set when enabled (unless existingSecret is set)
  cookieSecret: ""
  # OAuth2 client ID (not needed for JWT-only validation)
  clientId: ""
  # Client secret for OAuth2 flow (not needed for JWT-only validation)
  clientSecret: ""
  # Extra args passed to oauth2-proxy
  extraArgs: []
  # Extra environment variables
  extraEnv: []
  # Extra volumes (e.g., for authenticated-emails ConfigMap)
  extraVolumes: []
  # Extra volume mounts
  extraVolumeMounts: []
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -----------------------------------------------------------------------------
# Export Worker Secrets (local development only)
# -----------------------------------------------------------------------------
# Starburst credentials and internal API key.
# Local: Created from values (populated from environment variables)
# GKE: Created by Terraform with proper secret management
exportWorkerSecrets:
  enabled: false  # Enable for local development only
  starburstPassword: ""
  internalApiKey: "test-internal-api-key"

# -----------------------------------------------------------------------------
# Wrapper and JupyterHub Image Tags
# -----------------------------------------------------------------------------
# These services are dynamically spawned by control-plane. Their image tags are
# stored here so push.sh can update them consistently across environments.
# The actual images are built and pushed separately from the Helm chart.

ryugraph-wrapper:
  image:
    tag: "latest"  # Updated by push.sh

falkordb-wrapper:
  image:
    tag: "latest"  # Updated by push.sh

jupyter-labs:
  image:
    tag: "latest"  # Updated by push.sh

notebook-sync:
  image:
    tag: "latest"  # Updated by push.sh
