# Graph OLAP Platform - Production Environment Values
# Override for production deployment

global:
  imageRegistry: "us-central1-docker.pkg.dev/graph-olap-prod/graph-olap"
  gcpProject: "graph-olap-prod"
  environment: "production"

# Production-specific component configuration
control-plane:
  enabled: true
  replicaCount: 3
  image:
    # Use specific version tag in production
    tag: "v1.0.0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  config:
    logging:
      level: "INFO"

web-application:
  enabled: true
  replicaCount: 3
  image:
    tag: "v1.0.0"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 8
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

export-worker:
  enabled: true
  image:
    tag: "v1.0.0"
  keda:
    enabled: true
    minReplicaCount: 0
    maxReplicaCount: 5
  config:
    logging:
      level: "INFO"

ryugraph-wrapper:
  enabled: true
  image:
    tag: "v1.0.0"
  resources:
    requests:
      cpu: 2000m
      memory: 8Gi
    limits:
      cpu: 8000m
      memory: 32Gi

observability:
  enabled: true
