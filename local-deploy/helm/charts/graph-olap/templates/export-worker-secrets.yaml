{{- if .Values.exportWorkerSecrets.enabled }}
# =============================================================================
# Export Worker Secrets
# =============================================================================
# Secrets for export-worker service account and API authentication.
# Local: Created from values (envsubst'd from environment variables)
# GKE: Created by Terraform with proper secret management
---
apiVersion: v1
kind: Secret
metadata:
  name: export-worker-secrets
  labels:
    app: export-worker
    component: secrets
    {{- include "graph-olap.labels" . | nindent 4 }}
type: Opaque
stringData:
  STARBURST_PASSWORD: {{ .Values.exportWorkerSecrets.starburstPassword | quote }}
  GRAPH_OLAP_INTERNAL_API_KEY: {{ .Values.exportWorkerSecrets.internalApiKey | quote }}
{{- end }}
