# Default values for jupyter-labs (local development)
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: jupyter-labs
  pullPolicy: IfNotPresent
  # tag is set dynamically via --set image.tag=sha-${GIT_SHA}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: NodePort
  port: 8888
  targetPort: 8888
  nodePort: 30888

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: ""
      paths:
        - path: /jupyter
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # Reduced for local development (OrbStack K8s 12GB limit)
  # SDK tests run in external pytest process, not Jupyter kernel
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

persistence:
  enabled: true
  storageClassName: "local-path"
  accessMode: ReadWriteOnce
  size: 10Gi

# Environment variables
env:
  jupyterEnableLab: "yes"
  jupyterToken: ""
  controlPlaneUrl: "http://control-plane.e2e-test.svc.cluster.local:8080"
  e2eTestUsername: "e2e-test-user"
  grantSudo: "yes"
  # SDK environment-aware configuration
  graphOlapInClusterMode: "true"
  graphOlapNamespace: "e2e-test"

# Jupyter configuration
jupyterConfig:
  # Configuration is provided via ConfigMap
  enabled: true
  # Base URL for Jupyter (use "/" for dedicated subdomain, "/jupyter" for shared domain)
  baseUrl: "/jupyter"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Notebook sync configuration (for GKE deployments)
# Fetches notebooks from GitHub at pod startup
# Repo/path are baked into the notebook-sync image
notebookSync:
  enabled: false
  # Kubernetes secret containing GitHub token
  gitTokenSecret: "git-sync-token"
  # Init container image (built from Earthfile +notebook-sync target)
  image:
    repository: notebook-sync
    tag: latest
    pullPolicy: IfNotPresent

# Disable for staging/production
staging:
  enabled: false

production:
  enabled: false
