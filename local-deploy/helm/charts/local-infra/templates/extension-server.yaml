{{- if .Values.extensionServer.enabled }}
# =============================================================================
# Extension Server - Ryugraph Algorithm Extensions
# =============================================================================
# External service providing graph algorithm extensions.
# Same in both local and GKE deployments.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extension-server
  labels:
    app: extension-server
    component: extensions
    {{- include "local-infra.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.extensionServer.replicaCount }}
  selector:
    matchLabels:
      app: extension-server
  template:
    metadata:
      labels:
        app: extension-server
    spec:
      containers:
        - name: extension-server
          image: {{ .Values.extensionServer.image.repository }}:{{ .Values.extensionServer.image.tag }}
          imagePullPolicy: {{ .Values.extensionServer.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 2
          resources:
            {{- toYaml .Values.extensionServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: extension-server
  labels:
    app: extension-server
    {{- include "local-infra.labels" . | nindent 4 }}
spec:
  selector:
    app: extension-server
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
{{- end }}
